# Build requirements for x86_64-pc-windows-gnu (Rust stable-gnu toolchain)
# ─────────────────────────────────────────────────────────────────────────────
# The bundled MinGW 14.1 is missing two things needed for a clean build:
#
#   1. nanosleep64 — required by aws-lc-sys >= 0.37 (via rustls-platform-verifier)
#      FIX: build.rs adds C:\msys64\ucrt64\lib\libpthread.a (or mingw64) as an
#      extra link argument so GNU ld can resolve the symbol.
#
#   2. dlltool.exe — the bundled dlltool causes CreateProcess failures when
#      called by rustc to generate import libs for the windows-sys crate.
#      FIX: Use MSYS2 mingw64 GCC as the linker below — its associated dlltool
#      works correctly. Requires MSYS2 at C:\msys64 (standard install path).
#
# Together these two fixes (config.toml linker + build.rs libpthread) let
# `cargo build --release` and `cargo test` complete with zero errors.

[target.x86_64-pc-windows-gnu]
# Use MSYS2 mingw64 GCC as the linker (and its associated dlltool/ar).
linker = "C:\\msys64\\mingw64\\bin\\gcc.exe"
ar = "C:\\msys64\\mingw64\\bin\\ar.exe"

[env]
# cmake full path — allows whisper-rs-sys to find cmake without requiring it in system PATH.
# Only used when building with --features local-whisper.
CMAKE = { value = "C:\\msys64\\ucrt64\\bin\\cmake.exe", force = false }
# pkg-config search path — allows audiopus to find MSYS2 ucrt64 libopus.
PKG_CONFIG_PATH = { value = "C:\\msys64\\ucrt64\\lib\\pkgconfig", force = false }
# libclang DLL path — required by bindgen (whisper-rs-sys) to generate bindings.
LIBCLANG_PATH = { value = "C:\\msys64\\ucrt64\\bin", force = false }
# Force Ninja generator so cmake.rs can drive whisper.cpp on Windows GNU toolchain.
CMAKE_GENERATOR = { value = "Ninja", force = false }
# CMake toolchain file — overrides the /utf-8 MSVC flag that cmake-rs injects on
# Windows targets, which GCC rejects. Using a toolchain file lets us set the
# compilers and initial flags before cmake-rs appends its own flags, so the
# resulting CXX flags are pure GCC-compatible.
CMAKE_TOOLCHAIN_FILE = { value = "D:\\Users\\essence\\Development\\Telegram MCP\\rust\\mingw64-toolchain.cmake", force = false }
# Explicit C/C++ compilers passed via -D flags (cmake-rs reads these).
CMAKE_C_COMPILER = { value = "C:\\msys64\\mingw64\\bin\\gcc.exe", force = false }
CMAKE_CXX_COMPILER = { value = "C:\\msys64\\mingw64\\bin\\g++.exe", force = false }
